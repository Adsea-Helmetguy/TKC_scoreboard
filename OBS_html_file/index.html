<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TKC Scoreboard Overlay</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: #fff;
        background: transparent;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        min-height: 100%;
        background: transparent;
      }

      body {
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .scoreboard {
        display: grid;
        grid-template-columns: minmax(180px, 1fr) 72px minmax(180px, 0.7fr) 72px minmax(180px, 1fr);
        width: min(1120px, 100%);
        min-height: 62px;
        overflow: hidden;
        border-radius: 8px;
        color: #fff;
        background: transparent;
        box-shadow: none;
      }

      .score-name,
      .score-value,
      .round-block {
        display: grid;
        place-items: center;
        min-width: 0;
      }

      .score-name {
        padding: 0 18px;
        background: #641113;
        font-size: 25px;
        font-weight: 900;
        overflow-wrap: anywhere;
      }

      .left-name {
        border-radius: 8px 0 0 8px;
      }

      .right-name {
        border-radius: 0 8px 8px 0;
      }

      .score-value {
        background: #24252d;
        font-size: 34px;
        font-weight: 950;
      }

      .round-block {
        padding: 8px 12px;
        background: #641113;
        text-align: center;
        line-height: 1.1;
      }

      .round-block span {
        font-size: 18px;
        font-weight: 950;
        overflow-wrap: anywhere;
      }

      .round-block small {
        margin-top: 4px;
        color: #e4d4d3;
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
      }

      @media (max-width: 940px) {
        body {
          padding: 12px;
        }

        .scoreboard {
          grid-template-columns: minmax(82px, 1fr) 48px minmax(76px, 0.75fr) 48px minmax(82px, 1fr);
          min-height: 54px;
        }

        .score-name {
          padding: 0 8px;
          font-size: 16px;
        }

        .score-value {
          font-size: 26px;
        }

        .round-block span {
          font-size: 12px;
        }

        .round-block small {
          font-size: 10px;
        }
      }
    </style>
  </head>
  <body>
    <main class="scoreboard" aria-label="Scoreboard overlay preview">
      <div class="score-name left-name" id="leftName">Player 1</div>
      <div class="score-value" id="leftScore">0</div>
      <div class="round-block">
        <span id="roundLabel">Round 1</span>
        <small id="eventName">SEA-INBIRTHS Online Tournament</small>
      </div>
      <div class="score-value" id="rightScore">0</div>
      <div class="score-name right-name" id="rightName">Player 2</div>
    </main>

    <script>
      // Ready for websocket wiring:
      // connect to your server, then update these IDs:
      // leftName, leftScore, roundLabel, eventName, rightScore, rightName
    </script>
  </body>
</html>
