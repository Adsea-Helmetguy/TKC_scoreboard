<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PNG Scoreboard Websocket Test</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: #fff;
        background: transparent;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        min-height: 100%;
        background: transparent;
      }

      body {
        display: grid;
        place-items: start center;
      }

      .scoreboard-stage {
        position: relative;
        width: min(2560px, 100vw);
        aspect-ratio: 16 / 9;
        overflow: hidden;
      }

      .scoreboard-image {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }

      .scoreboard-text {
        position: absolute;
        z-index: 1;
        display: grid;
        place-items: center;
        margin: 0;
        min-width: 0;
        overflow: hidden;
        color: #fff;
        font-weight: 900;
        line-height: 1;
        text-align: center;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.85);
        white-space: nowrap;
      }

      .player-name {
        font-size: clamp(12px, 1.45vw, 38px);
        padding: 0 1.2vw;
      }

      .score {
        font-size: clamp(16px, 1.9vw, 50px);
      }

      .round {
        font-size: clamp(10px, 1.05vw, 28px);
      }

      .event {
        align-items: end;
        color: #d9d9d9;
        font-size: clamp(7px, 0.58vw, 15px);
        font-weight: 800;
        line-height: 1.1;
        padding-bottom: 0.45vw;
        text-transform: uppercase;
      }

      #leftName {
        left: 20.43%;
        top: 2.71%;
        width: 21.84%;
        height: 3.89%;
      }

      #leftScore {
        left: 42.38%;
        top: 2.71%;
        width: 2.38%;
        height: 3.89%;
      }

      #roundLabel {
        left: 46.68%;
        top: 1.55%;
        width: 6.72%;
        height: 3.15%;
      }

      #eventName {
        left: 46.68%;
        top: 4.35%;
        width: 6.72%;
        height: 2.15%;
      }

      #rightScore {
        left: 55.04%;
        top: 2.71%;
        width: 2.38%;
        height: 3.89%;
      }

      #rightName {
        left: 57.73%;
        top: 2.71%;
        width: 21.84%;
        height: 3.89%;
      }
    </style>
  </head>
  <body>
    <main class="scoreboard-stage" aria-label="PNG scoreboard websocket test">
      <img class="scoreboard-image" src="images/UNIscoreboard.png" alt="Scoreboard" />

      <p class="scoreboard-text player-name" id="leftName">Player 1</p>
      <p class="scoreboard-text score" id="leftScore">0</p>
      <p class="scoreboard-text round" id="roundLabel">Round 1</p>
      <p class="scoreboard-text event" id="eventName">SEA-INBIRTHS Online Tournament</p>
      <p class="scoreboard-text score" id="rightScore">0</p>
      <p class="scoreboard-text player-name" id="rightName">Player 2</p>
    </main>

    <script>
      // Same fields as index.html:
      // leftName, leftScore, roundLabel, eventName, rightScore, rightName
      //
      const SOCKET_URL = "wss://tkc-scoreboard.onrender.com";

      const fields = {
        leftName: document.getElementById("leftName"),
        leftScore: document.getElementById("leftScore"),
        roundLabel: document.getElementById("roundLabel"),
        eventName: document.getElementById("eventName"),
        rightScore: document.getElementById("rightScore"),
        rightName: document.getElementById("rightName"),
      };

      function updateScoreboard(match) {
        const values = {
          leftName: match.left?.name || "Player 1",
          leftScore: match.left?.score ?? 0,
          roundLabel: match.round || "Round",
          eventName: match.eventName || "",
          rightScore: match.right?.score ?? 0,
          rightName: match.right?.name || "Player 2",
        };

        Object.entries(values).forEach(([key, value]) => {
          fields[key].textContent = value;
        });
      }

      function captureScoreboardMessage(message) {
        if (message?.type === "state" && message.payload) {
          updateScoreboard(message.payload);
          return;
        }

        if (message?.left || message?.right) {
          updateScoreboard(message);
          return;
        }

        updateScoreboard(message);
      }

      if (SOCKET_URL) {
        const socket = new WebSocket(SOCKET_URL);

        socket.addEventListener("open", () => {
          console.log("Scoreboard websocket connected:", SOCKET_URL);
        });

        socket.addEventListener("message", (event) => {
          try {
            const message = JSON.parse(event.data);
            console.log("Scoreboard websocket message:", message);
            captureScoreboardMessage(message);
          } catch (error) {
            console.error("Invalid scoreboard websocket message:", error);
          }
        });

        socket.addEventListener("close", (event) => {
          console.log("Scoreboard websocket closed:", event.code, event.reason);
        });

        socket.addEventListener("error", (error) => {
          console.error("Scoreboard websocket error:", error);
        });
      }
    </script>
  </body>
</html>
